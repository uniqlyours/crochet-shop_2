<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · Loop &amp; Petal admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Karla:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="mark"></div>
    <h1>Shop admin</h1>
    <p>Sign in to manage products and orders.</p>
    <div class="login-err" id="err"></div>
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus>
    <button class="btn" id="go">Sign in</button>
    <p class="login-hint">Default password is <b>crochet-admin</b> — change it in your <b>.env</b> file (ADMIN_PASSWORD) before going live.</p>
  </div>
</div>
<script src="/admin/admin.js"></script>
<script>
  const pw = document.getElementById('pw'), err = document.getElementById('err'), go = document.getElementById('go');
  async function signIn(){
    err.textContent=''; go.disabled=true; go.textContent='Signing in…';
    try{
      const r = await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({password:pw.value})});
      if(r.ok){ location.href='/admin/index.html'; return; }
      const d = await r.json(); err.textContent = d.error || 'Could not sign in.';
    }catch{ err.textContent='Could not reach the server.'; }
    go.disabled=false; go.textContent='Sign in';
  }
  go.addEventListener('click', signIn);
  pw.addEventListener('keydown', e=>{ if(e.key==='Enter') signIn(); });
</script>
</body>
</html>
